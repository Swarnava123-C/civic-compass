name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Run tests with coverage (enforces 80% threshold)
        run: npm run test:coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const c=require('./coverage/coverage-summary.json').total;console.log('Coverage — lines:'+c.lines.pct+'% functions:'+c.functions.pct+'% branches:'+c.branches.pct+'% statements:'+c.statements.pct+'%')"
          fi

      - name: Security audit (high severity, production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build

      - name: Bundle size check (warn >250kb gzipped, fail >300kb)
        run: |
          TOTAL=$(find dist/assets -name "*.js" -exec gzip -c {} + | wc -c)
          KB=$((TOTAL / 1024))
          echo "Gzipped JS bundle: ${KB} KB"
          if [ "$KB" -gt 300 ]; then echo "::error::Bundle size ${KB}KB exceeds 300KB limit"; exit 1; fi
          if [ "$KB" -gt 250 ]; then echo "::warning::Bundle size ${KB}KB exceeds 250KB warning threshold"; fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
